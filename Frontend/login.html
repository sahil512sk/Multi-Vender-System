<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login / Register</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 1.5rem;
            color: #1a1a2e;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }

        input:focus { border-color: #6c63ff; }

        button {
            width: 100%;
            padding: 0.8rem;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }

        button:hover { background: #574fd6; }
        button:disabled { background: #aaa; cursor: not-allowed; }

        .msg {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        .msg.error   { background: #ffe5e5; color: #c0392b; }
        .msg.success { background: #e5ffe9; color: #27ae60; }

        .divider {
            text-align: center;
            color: #aaa;
            margin: 1rem 0;
            font-size: 0.85rem;
        }

        .hidden { display: none; }

        .otp-timer {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.4rem;
        }

        .resend-btn {
            background: none;
            color: #6c63ff;
            border: none;
            padding: 0;
            font-size: 0.85rem;
            cursor: pointer;
            width: auto;
            margin-top: 0.5rem;
            text-decoration: underline;
        }

        .resend-btn:disabled { color: #aaa; }
    </style>
</head>
<body>
<div class="card">

    <!-- Step 1: Identifier Input -->
    <div id="step-identifier">
        <h2>Welcome 👋</h2>
        <p style="color:#888; margin-bottom:1.5rem; font-size:0.9rem">Enter your email or mobile to continue</p>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com" />
        </div>

        <div class="divider">— or —</div>

        <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" id="mobile" placeholder="10 digit mobile number" maxlength="10" />
        </div>

        <button id="btn-check" onclick="checkUser()">Continue</button>
        <div class="msg" id="msg-identifier"></div>
    </div>

    <!-- Step 2a: OTP Login -->
    <div id="step-otp" class="hidden">
        <h2>Enter OTP 🔐</h2>
        <p style="color:#888; margin-bottom:1.5rem; font-size:0.9rem" id="otp-sent-msg"></p>

        <div class="form-group">
            <label>OTP</label>
            <input type="text" id="otp" placeholder="6-digit OTP" maxlength="6" />
            <div class="otp-timer" id="otp-timer"></div>
        </div>

        <button onclick="verifyOtp()">Login</button>
        <button class="resend-btn" id="resend-btn" onclick="resendOtp()" disabled>Resend OTP</button>
        <div class="msg" id="msg-otp"></div>
    </div>

    <!-- Step 2b: Register Form -->
    <div id="step-register" class="hidden">
        <h2>Create Account ✨</h2>
        <p style="color:#888; margin-bottom:1.5rem; font-size:0.9rem">Fill in your details to register</p>

        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="reg-name" placeholder="John Doe" />
        </div>

        <div class="form-group" id="reg-email-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="you@example.com" />
        </div>

        <div class="form-group" id="reg-mobile-group">
            <label>Mobile Number</label>
            <input type="tel" id="reg-mobile" placeholder="10 digit number" maxlength="10" />
        </div>

        <div class="form-group">
            <label>Password *</label>
            <input type="password" id="reg-password" placeholder="Min 6 characters" />
        </div>

        <button onclick="registerUser()">Register</button>
        <button class="resend-btn" style="margin-top:0.8rem" onclick="goBack()">← Back</button>
        <div class="msg" id="msg-register"></div>
    </div>

</div>

<script>
    const API = 'http://localhost:5000/api/auth';

    let currentEmail  = '';
    let currentMobile = '';
    let otpTimer      = null;

    // ─── Helpers ────────────────────────────────────────────
    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent  = text;
        el.className    = `msg ${type}`;
        el.style.display = 'block';
    }

    function hideMsg(id) {
        document.getElementById(id).style.display = 'none';
    }

    function showStep(stepId) {
        ['step-identifier', 'step-otp', 'step-register'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
        document.getElementById(stepId).classList.remove('hidden');
    }

    function startOtpTimer(seconds = 120) {
        clearInterval(otpTimer);
        const timerEl  = document.getElementById('otp-timer');
        const resendBtn = document.getElementById('resend-btn');
        resendBtn.disabled = true;

        let remaining = seconds;
        timerEl.textContent = `Resend OTP in ${remaining}s`;

        otpTimer = setInterval(() => {
            remaining--;
            timerEl.textContent = `Resend OTP in ${remaining}s`;
            if (remaining <= 0) {
                clearInterval(otpTimer);
                timerEl.textContent = '';
                resendBtn.disabled = false;
            }
        }, 1000);
    }

    // ─── Step 1: Check User ──────────────────────────────────
    async function checkUser() {
        hideMsg('msg-identifier');

        const email  = document.getElementById('email').value.trim();
        const mobile = document.getElementById('mobile').value.trim();

        if (!email && !mobile) {
            return showMsg('msg-identifier', 'Please enter email or mobile number', 'error');
        }

        if (mobile && !/^[0-9]{10}$/.test(mobile)) {
            return showMsg('msg-identifier', 'Enter a valid 10-digit mobile number', 'error');
        }

        currentEmail  = email;
        currentMobile = mobile;

        const btn = document.getElementById('btn-check');
        btn.disabled = true;
        btn.textContent = 'Checking...';

        try {
            const res  = await fetch(`${API}/check`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, mobile })
            });
            const data = await res.json();

            if (data.userExists) {
                // Show OTP step
                const via = [
                    data.hasEmail  ? 'email'  : null,
                    data.hasMobile ? 'mobile' : null
                ].filter(Boolean).join(' & ');

                document.getElementById('otp-sent-msg').textContent =
                    `OTP sent to your ${via}`;

                showStep('step-otp');
                startOtpTimer();
            } else {
                // Show register step — prefill whatever they entered
                if (email)  document.getElementById('reg-email').value  = email;
                if (mobile) document.getElementById('reg-mobile').value = mobile;

                showStep('step-register');
            }

        } catch (err) {
            showMsg('msg-identifier', 'Something went wrong. Try again.', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Continue';
        }
    }

    // ─── Step 2a: Verify OTP ─────────────────────────────────
    async function verifyOtp() {
        hideMsg('msg-otp');
        const otp = document.getElementById('otp').value.trim();

        if (!otp || otp.length !== 6) {
            return showMsg('msg-otp', 'Enter a valid 6-digit OTP', 'error');
        }

        try {
            const res  = await fetch(`${API}/verify-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email:  currentEmail  || undefined,
                    mobile: currentMobile || undefined,
                    otp
                })
            });
            const data = await res.json();

            if (!res.ok) {
                return showMsg('msg-otp', data.message, 'error');
            }

            // Save token and redirect
            localStorage.setItem('token', data.token);
            showMsg('msg-otp', 'Login successful! Redirecting...', 'success');
            setTimeout(() => window.location.href = '/dashboard.html', 1500);

        } catch (err) {
            showMsg('msg-otp', 'Something went wrong. Try again.', 'error');
        }
    }

    // ─── Resend OTP ──────────────────────────────────────────
    async function resendOtp() {
        hideMsg('msg-otp');
        try {
            const res  = await fetch(`${API}/check`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email:  currentEmail  || undefined,
                    mobile: currentMobile || undefined
                })
            });
            const data = await res.json();
            if (res.ok) {
                showMsg('msg-otp', 'OTP resent successfully', 'success');
                startOtpTimer();
            } else {
                showMsg('msg-otp', data.message, 'error');
            }
        } catch {
            showMsg('msg-otp', 'Failed to resend OTP', 'error');
        }
    }

    // ─── Step 2b: Register ───────────────────────────────────
    async function registerUser() {
        hideMsg('msg-register');

        const name     = document.getElementById('reg-name').value.trim();
        const email    = document.getElementById('reg-email').value.trim();
        const mobile   = document.getElementById('reg-mobile').value.trim();
        const password = document.getElementById('reg-password').value;

        if (!name)     return showMsg('msg-register', 'Name is required', 'error');
        if (!password) return showMsg('msg-register', 'Password is required', 'error');
        if (!email && !mobile) return showMsg('msg-register', 'Provide email or mobile', 'error');
        if (mobile && !/^[0-9]{10}$/.test(mobile)) {
            return showMsg('msg-register', 'Enter a valid 10-digit mobile number', 'error');
        }
        if (password.length < 6) {
            return showMsg('msg-register', 'Password must be at least 6 characters', 'error');
        }

        try {
            const res  = await fetch(`${API}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name,
                    email:    email    || undefined,
                    mobile:   mobile   || undefined,
                    password
                })
            });
            const data = await res.json();

            if (!res.ok) {
                return showMsg('msg-register', data.message, 'error');
            }

            localStorage.setItem('token', data.token);
            showMsg('msg-register', 'Registered successfully! Redirecting...', 'success');
            setTimeout(() => window.location.href = '/dashboard.html', 1500);

        } catch (err) {
            showMsg('msg-register', 'Something went wrong. Try again.', 'error');
        }
    }

    // ─── Back button ─────────────────────────────────────────
    function goBack() {
        showStep('step-identifier');
    }

    // ─── Allow Enter key ─────────────────────────────────────
    document.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        const activeStep = document.querySelector('.card > div:not(.hidden)').id;
        if (activeStep === 'step-identifier') checkUser();
        if (activeStep === 'step-otp')        verifyOtp();
        if (activeStep === 'step-register')   registerUser();
    });
</script>
</body>
</html>
